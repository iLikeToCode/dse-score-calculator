<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DSE Score Results</title>
    <link rel="stylesheet" href="./assets/styles.css">
    <script src="./assets/data.js" defer></script>
    <script src="./assets/results.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-bar">
        <a class="back-link" href="./index.html">Score Calculator</a>
        <div class="score-chip" aria-live="polite">
          <span class="score-chip-label">Score</span>
          <strong id="scoreValue">0</strong>
        </div>
      </header>

      <main class="workspace result-workspace">
        <section class="score-area" aria-labelledby="resultTitle">
          <div class="title-row">
            <div>
              <p class="eyebrow">Results</p>
              <h1 id="resultTitle">DSE Score Results</h1>
            </div>
            <div class="totals-grid" aria-label="Score totals">
              <div>
                <span>Positive</span>
                <strong id="positiveTotal">0</strong>
              </div>
              <div>
                <span>Deductions</span>
                <strong id="deductionTotal">0</strong>
              </div>
            </div>
          </div>

          <div id="errorPanel" class="error-panel" hidden></div>

          <div id="resultContent">
            <section class="point-section" aria-labelledby="positiveHeading">
              <div class="section-heading">
                <h2 id="positiveHeading">Positive Items</h2>
                <span id="positiveCount">0 selected</span>
              </div>
              <div class="list-head" aria-hidden="true">
                <span>Name</span>
                <span>Value</span>
              </div>
              <div id="positiveList" class="point-list"></div>
            </section>

            <section class="point-section" aria-labelledby="deductionsHeading">
              <div class="section-heading">
                <h2 id="deductionsHeading">Deductions</h2>
                <span id="deductionCount">0 selected</span>
              </div>
              <div class="list-head" aria-hidden="true">
                <span>Name</span>
                <span>Value</span>
              </div>
              <div id="deductionList" class="point-list"></div>
            </section>
          </div>
        </section>

        <aside class="summary-panel" aria-labelledby="summaryHeading">
          <h2 id="summaryHeading">Result</h2>
          <dl class="summary-list">
            <div>
              <dt>Positive</dt>
              <dd id="summaryPositive">0</dd>
            </div>
            <div>
              <dt>Deductions</dt>
              <dd id="summaryDeductions">0</dd>
            </div>
            <div class="summary-score">
              <dt>Final Score</dt>
              <dd id="summaryScore">0</dd>
            </div>
          </dl>
          <a id="editLink" class="primary-action action-link" href="./index.html">Edit Scorecard</a>
        </aside>
      </main>
    </div>
  </body>
</html>
